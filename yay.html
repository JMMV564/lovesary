<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yaaay!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #f5d0fe, transparent 35%),
        radial-gradient(circle at bottom left, #e9d5ff, transparent 40%),
        linear-gradient(135deg, #4c1d95, #9333ea, #e879f9);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .sparkle {
      position: fixed;
      font-size: 26px;
      animation: float 6s linear infinite;
      bottom: -40px;
      opacity: 0.8;
      z-index: 0;
    }

    .sparkle:nth-child(1) { left: 12%; animation-delay: 0s; }
    .sparkle:nth-child(2) { left: 32%; animation-delay: 2s; }
    .sparkle:nth-child(3) { left: 55%; animation-delay: 4s; }
    .sparkle:nth-child(4) { left: 77%; animation-delay: 1s; }
    .sparkle:nth-child(5) { left: 90%; animation-delay: 3s; }

    @keyframes float {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      to {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.18);
      padding: 45px 35px;
      border-radius: 35px;
      box-shadow: 0 20px 50px rgba(59, 7, 100, 0.45);
      backdrop-filter: blur(14px);
      max-width: 720px;
      width: 100%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      animation: pop 0.8s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.75);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .emoji {
      font-size: 5rem;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    h1 {
      font-size: 3.5rem;
      margin: 15px 0;
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #fae8ff;
      line-height: 1.5;
    }

    .yay-photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin: 30px auto;
      max-width: 600px;
    }

    .yay-photo-box {
      height: 160px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 25px rgba(59, 7, 100, 0.35);
      transition: 0.3s ease;
      position: relative;
    }

    .yay-photo-box::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 2px dashed rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      z-index: 1;
      pointer-events: none;
    }

    .yay-photo-box::after {
      content: "💕";
      position: absolute;
      right: 8px;
      bottom: 6px;
      font-size: 22px;
      z-index: 2;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.35));
    }

    .yay-photo-box:nth-child(1) {
      transform: rotate(-3deg);
    }

    .yay-photo-box:nth-child(2) {
      transform: rotate(2deg);
    }

    .yay-photo-box:nth-child(3) {
      transform: rotate(-2deg);
    }

    .yay-photo-box:nth-child(4) {
      transform: rotate(2.5deg);
    }

    .yay-photo-box:nth-child(5) {
      transform: rotate(-2.5deg);
    }

    .yay-photo-box:nth-child(6) {
      transform: rotate(3deg);
    }

    .yay-photo-box:hover {
      transform: scale(1.06) rotate(0deg);
    }

    .yay-photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.1);
    }

    .date-note {
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.35);
      padding: 18px;
      border-radius: 24px;
      margin: 25px auto;
      max-width: 520px;
      color: #fff7fe;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #fce7f3;
      color: #701a75;
      padding: 16px 34px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.1rem;
      transition: 0.3s;
      box-shadow: 0 0 25px rgba(252, 231, 243, 0.9);
      margin-top: 5px;
    }

    a:hover {
      background: #fff1f2;
      transform: scale(1.08);
    }

    @media (max-width: 650px) {
      .container {
        padding: 35px 20px;
      }

      h1 {
        font-size: 2.6rem;
      }

      .emoji {
        font-size: 4rem;
      }

      p {
        font-size: 1rem;
      }

      .yay-photo-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .yay-photo-box {
        height: 130px;
        border-radius: 23px;
      }
    }

    @media (max-width: 390px) {
      .yay-photo-grid {
        grid-template-columns: 1fr;
      }

      .yay-photo-box {
        height: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="sparkle">💜</div>
  <div class="sparkle">✨</div>
  <div class="sparkle">💕</div>
  <div class="sparkle">💖</div>
  <div class="sparkle">✨</div>

  <div class="container">
    <div class="emoji">🎉💜</div>

    <h1>Yaaay!</h1>

    <p>
      Congratulations, you have officially made the cutest decision ever.
    </p>

    <div class="yay-photo-grid">
      <div class="yay-photo-box">
        <img src="photo1.jpg" alt="Cute memory 1">
      </div>

      <div class="yay-photo-box">
        <img src="photo2.jpg" alt="Cute memory 2">
      </div>

      <div class="yay-photo-box">
        <img src="photo3.jpg" alt="Cute memory 3">
      </div>

      <div class="yay-photo-box">
        <img src="photo4.jpg" alt="Cute memory 4">
      </div>

      <div class="yay-photo-box">
        <img src="photo5.jpg" alt="Cute memory 5">
      </div>

      <div class="yay-photo-box">
        <img src="photo6.jpg" alt="Cute memory 6">
      </div>
    </div>

    <div class="date-note">
      Since you said yes, please answer this very serious and very important date survey.
      Your answers will determine the official cuteness level of our date. 💌
    </div>

    <!-- Replace this with your actual Google Form or survey link -->
    <a href="https://forms.gle/example" target="_blank">
      Answer the cute survey 💌
    </a>
  </div>
</body>
</html>
