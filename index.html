<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Very Important Question</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #f5d0fe, transparent 35%),
        radial-gradient(circle at bottom right, #c084fc, transparent 35%),
        linear-gradient(135deg, #581c87, #9333ea, #e879f9);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      padding: 20px;
    }

    .heart {
      position: fixed;
      color: rgba(255, 255, 255, 0.6);
      font-size: 24px;
      animation: floatUp 7s linear infinite;
      bottom: -50px;
      z-index: 0;
    }

    .heart:nth-child(1) { left: 10%; animation-delay: 0s; }
    .heart:nth-child(2) { left: 25%; animation-delay: 2s; font-size: 18px; }
    .heart:nth-child(3) { left: 45%; animation-delay: 4s; font-size: 30px; }
    .heart:nth-child(4) { left: 70%; animation-delay: 1s; font-size: 20px; }
    .heart:nth-child(5) { left: 85%; animation-delay: 3s; font-size: 28px; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.18);
      padding: 35px 30px;
      border-radius: 35px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(59, 7, 100, 0.45);
      backdrop-filter: blur(14px);
      width: 100%;
      max-width: 620px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      animation: popIn 0.8s ease;
    }

    @keyframes popIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .cute-icon {
      font-size: 3.8rem;
      margin-bottom: 10px;
      animation: bounce 1.8s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .photo-grid {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 10px 0 25px;
      flex-wrap: wrap;
    }

    .photo-box {
      width: 125px;
      height: 125px;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 25px rgba(59, 7, 100, 0.35);
      transition: 0.3s ease;
      position: relative;
    }

    .photo-box::after {
      content: "💜";
      position: absolute;
      right: 6px;
      bottom: 4px;
      font-size: 20px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.35));
    }

    .photo-box:nth-child(1) {
      transform: rotate(-4deg);
    }

    .photo-box:nth-child(2) {
      transform: rotate(3deg);
    }

    .photo-box:nth-child(3) {
      transform: rotate(-2deg);
    }

    .photo-box:hover {
      transform: scale(1.08) rotate(0deg);
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      font-size: 2rem;
      margin: 10px 0;
      line-height: 1.3;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
    }

    .subtitle {
      font-size: 1rem;
      color: #fae8ff;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      padding: 15px 32px;
      font-size: 1.15rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      font-family: inherit;
    }

    #yesBtn {
      background: #fce7f3;
      color: #701a75;
      box-shadow: 0 0 25px rgba(252, 231, 243, 0.9);
    }

    #yesBtn:hover {
      background: #fff1f2;
      transform: scale(1.08);
    }

    #noBtn {
      background: #7e22ce;
      color: white;
      border: 2px solid #f5d0fe;
      transition: top 0.18s ease, left 0.18s ease, background 0.3s ease, transform 0.3s ease;
    }

    #noBtn:hover {
      background: #a855f7;
    }

    .message {
      min-height: 24px;
      margin-top: 25px;
      font-size: 1rem;
      color: #fae8ff;
      font-weight: bold;
    }

    .fullscreen-yes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      font-size: 4rem !important;
      z-index: 9999;
      transform: none !important;
      background: linear-gradient(135deg, #f5d0fe, #e879f9, #c084fc) !important;
      color: #3b0764 !important;
    }

    @media (max-width: 520px) {
      .card {
        padding: 30px 18px;
      }

      h1 {
        font-size: 1.55rem;
      }

      .cute-icon {
        font-size: 3rem;
      }

      .photo-box {
        width: 95px;
        height: 95px;
        border-radius: 20px;
      }

      button {
        font-size: 1rem;
        padding: 13px 25px;
      }
    }
  </style>
</head>

<body>
  <div class="heart">💜</div>
  <div class="heart">💕</div>
  <div class="heart">💖</div>
  <div class="heart">✨</div>
  <div class="heart">💜</div>

  <div class="card">
    <div class="cute-icon">🥺💜</div>

    <div class="photo-grid">
      <div class="photo-box">
        <img src="photo1.jpg" alt="Cute photo 1">
      </div>

      <div class="photo-box">
        <img src="photo2.jpg" alt="Cute photo 2">
      </div>

      <div class="photo-box">
        <img src="photo3.jpg" alt="Cute photo 3">
      </div>
    </div>

    <h1>Would you go out on a date with me?</h1>
    <p class="subtitle">Madali lang ung sagot hehe (yes)</p>

    <div class="buttons">
      <button id="yesBtn">Yes 💜</button>
      <button id="noBtn">No 😭</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    let yesSize = 1;
    let noClicks = 0;
    let noButtonRunsAway = false;

    const cuteMessages = [
      "REALLYY? 🥺",
      "Ulett, pretty pleaseeee 💜",
      "ARAY mu huhuhu 😭",
      "The Yes button is getting stronger...",
      "Why are you still pressing No? 😭",
      "Okay, this is getting personal 💔",
      "Destiny is choosing Yes for you 💜",
      "The No button is getting scared now...",
      "Now catch it if you can 😤"
    ];

    const annoyingNoTexts = [
      "Still no?",
      "Really?",
      "Ouch 💔",
      "Try again",
      "Wrong button",
      "Nope?",
      "Hmm...",
      "Why 😭",
      "Just say yes",
      "You missed 💜"
    ];

    noBtn.addEventListener("click", () => {
      noClicks++;

      yesSize += 0.35;
      yesBtn.style.transform = `scale(${yesSize})`;
      yesBtn.style.padding = `${15 + noClicks * 5}px ${32 + noClicks * 12}px`;
      yesBtn.style.fontSize = `${1.15 + noClicks * 0.18}rem`;

      message.textContent = cuteMessages[Math.min(noClicks - 1, cuteMessages.length - 1)];

      if (noClicks >= 5 && noClicks < 9) {
        noBtn.textContent = annoyingNoTexts[Math.floor(Math.random() * annoyingNoTexts.length)];

        noBtn.style.position = "fixed";
        noBtn.style.zIndex = "1000";

        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;

        const randomRotate = Math.floor(Math.random() * 50) - 25;
        const shrinkSize = Math.max(0.6, 1 - (noClicks - 5) * 0.08);

        noBtn.style.transform = `rotate(${randomRotate}deg) scale(${shrinkSize})`;
      }

      if (noClicks >= 9) {
        noButtonRunsAway = true;

        noBtn.textContent = "Catch me 😝";
        noBtn.style.position = "fixed";
        noBtn.style.zIndex = "1000";
      }

      if (noClicks >= 13) {
        yesBtn.classList.add("fullscreen-yes");
        yesBtn.textContent = "YES 💜";
        noBtn.style.display = "none";
        message.textContent = "";
      }
    });

    document.addEventListener("mousemove", (event) => {
      if (!noButtonRunsAway) return;

      const noRect = noBtn.getBoundingClientRect();

      const buttonCenterX = noRect.left + noRect.width / 2;
      const buttonCenterY = noRect.top + noRect.height / 2;

      const distanceX = event.clientX - buttonCenterX;
      const distanceY = event.clientY - buttonCenterY;

      const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

      if (distance < 160) {
        const maxX = window.innerWidth - noRect.width - 10;
        const maxY = window.innerHeight - noRect.height - 10;

        let newX = noRect.left - distanceX * 1.5;
        let newY = noRect.top - distanceY * 1.5;

        newX = Math.max(10, Math.min(maxX, newX));
        newY = Math.max(10, Math.min(maxY, newY));

        noBtn.style.left = `${newX}px`;
        noBtn.style.top = `${newY}px`;

        const randomRotate = Math.floor(Math.random() * 40) - 20;
        noBtn.style.transform = `rotate(${randomRotate}deg) scale(0.7)`;
      }
    });

    yesBtn.addEventListener("click", () => {
      window.location.href = "yay.html";
    });
  </script>
</body>
</html>
